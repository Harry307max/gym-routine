<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Haris Ahmad — Gym Routine</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --card: #16161f;
    --border: #1e1e2e;
    --accent: #c8f135;
    --red: #f43f5e;
    --text: #e8e8f0;
    --muted: #6b6b80;
    --chest: #f97316;
    --back: #7c3aed;
    --bicep: #22d3ee;
    --shoulder: #c8f135;
    --off: #3b3b4f;
    --r: 12px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Space Grotesk', sans-serif; min-height: 100vh; overflow-x: hidden; }

  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 1rem 2rem; border-bottom: 1px solid var(--border);
    background: var(--surface); position: sticky; top: 0; z-index: 100;
  }
  .logo { display: flex; align-items: center; gap: .7rem; }
  .logo-icon { width: 34px; height: 34px; border-radius: 8px; background: var(--accent); display: grid; place-items: center; font-size: 1rem; }
  .logo-text { font-size: .95rem; font-weight: 700; }
  .logo-sub { font-size: .65rem; color: var(--muted); font-family: 'DM Mono', monospace; }
  header nav { display: flex; align-items: center; gap: .6rem; }
  #clock { font-family: 'DM Mono', monospace; font-size: .75rem; color: var(--muted); }
  #notifStatus { font-family: 'DM Mono', monospace; font-size: .7rem; color: var(--muted); }
  #notifBtn {
    background: var(--accent); color: #000; font-weight: 700; border: none;
    padding: .45rem 1rem; border-radius: 8px; font-family: 'Space Grotesk', sans-serif;
    font-size: .8rem; cursor: pointer;
  }
  #notifBtn:hover { background: #b5db2a; }

  main { display: grid; grid-template-columns: 1fr 310px; gap: 1.4rem; padding: 1.4rem 2rem; max-width: 1500px; margin: 0 auto; }
  .sec-title { font-size: .62rem; font-family: 'DM Mono', monospace; letter-spacing: .12em; color: var(--muted); text-transform: uppercase; margin-bottom: .8rem; }

  .cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
  .cal-month { font-size: 1.35rem; font-weight: 700; letter-spacing: -.03em; }
  .cal-nav { display: flex; gap: .4rem; }
  .cal-nav button {
    width: 30px; height: 30px; border-radius: 8px; background: var(--card);
    border: 1px solid var(--border); color: var(--text); cursor: pointer;
    font-size: .9rem; display: grid; place-items: center; transition: all .2s;
  }
  .cal-nav button:hover { border-color: var(--accent); color: var(--accent); }

  .day-labels { display: grid; grid-template-columns: repeat(7,1fr); gap: 5px; margin-bottom: 5px; }
  .day-label { text-align: center; font-size: .65rem; font-family: 'DM Mono', monospace; color: var(--muted); padding: .3rem 0; }

  .cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 5px; }

  .cal-day {
    min-height: 72px;
    border-radius: var(--r); background: var(--card);
    border: 1px solid var(--border);
    padding: .6rem .65rem; cursor: pointer;
    transition: transform .18s, border-color .18s;
    display: flex; flex-direction: column; gap: 4px;
    position: relative; overflow: hidden;
  }
  .cal-day:hover { transform: translateY(-2px); border-color: #2e2e45; }
  .cal-day.empty { background: transparent; border-color: transparent; cursor: default; }
  .cal-day.today { border-color: var(--accent) !important; box-shadow: 0 0 0 1px var(--accent); }

  .cal-day .dn { font-size: .85rem; font-weight: 700; }
  .cal-day .split-badge-sm {
    font-size: .58rem; font-family: 'DM Mono', monospace; font-weight: 700;
    padding: 2px 6px; border-radius: 4px; text-transform: uppercase;
    letter-spacing: .04em; align-self: flex-start;
  }
  .cal-day .meal-dots { display: flex; gap: 3px; margin-top: auto; padding-top: 4px; }
  .mdot { width: 5px; height: 5px; border-radius: 50%; }

  .s-chest { border-top: 3px solid var(--chest); }
  .s-chest .split-badge-sm { background: rgba(249,115,22,.15); color: var(--chest); }
  .s-back { border-top: 3px solid var(--back); }
  .s-back .split-badge-sm { background: rgba(124,58,237,.15); color: var(--back); }
  .s-bicep { border-top: 3px solid var(--bicep); }
  .s-bicep .split-badge-sm { background: rgba(34,211,238,.15); color: var(--bicep); }
  .s-shoulder { border-top: 3px solid var(--shoulder); }
  .s-shoulder .split-badge-sm { background: rgba(200,241,53,.15); color: var(--shoulder); }
  .s-off { border-top: 3px solid var(--off); }
  .s-off .split-badge-sm { background: rgba(59,59,79,.3); color: var(--muted); }

  .sidebar { display: flex; flex-direction: column; gap: 1.1rem; }

  .today-card { background: var(--card); border-radius: var(--r); border: 1px solid var(--border); padding: 1.1rem; }
  .split-pill {
    display: inline-flex; align-items: center; gap: .4rem;
    font-size: .72rem; font-weight: 700; padding: .3rem .75rem;
    border-radius: 20px; margin-bottom: .75rem;
    font-family: 'DM Mono', monospace; text-transform: uppercase;
  }
  .workout-list { display: flex; flex-direction: column; gap: .35rem; }
  .workout-ex {
    display: flex; align-items: center; justify-content: space-between;
    padding: .4rem .65rem; background: var(--surface); border-radius: 8px; font-size: .78rem;
  }
  .workout-ex .sets { font-family: 'DM Mono', monospace; font-size: .68rem; color: var(--muted); }

  .meal-card { background: var(--card); border-radius: var(--r); border: 1px solid var(--border); padding: 1.1rem; }
  .meal-item {
    display: flex; align-items: flex-start; gap: .7rem;
    padding: .55rem 0; border-bottom: 1px solid var(--border);
  }
  .meal-item:last-child { border-bottom: none; padding-bottom: 0; }
  .meal-icon { font-size: 1.1rem; flex-shrink: 0; margin-top: .1rem; }
  .meal-time { font-family: 'DM Mono', monospace; font-size: .62rem; color: var(--muted); }
  .meal-name { font-size: .8rem; font-weight: 600; margin: .1rem 0 .15rem; }
  .meal-detail { font-size: .7rem; color: var(--muted); line-height: 1.4; }

  .timeline-card { background: var(--card); border-radius: var(--r); border: 1px solid var(--border); padding: 1.1rem; }
  .t-item { display: flex; align-items: flex-start; gap: .7rem; padding: .5rem 0; position: relative; }
  .t-item:not(:last-child)::after {
    content: ''; position: absolute; left: 14px; top: 30px;
    width: 1px; height: calc(100% - 6px); background: var(--border);
  }
  .t-dot { width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0; display: grid; place-items: center; font-size: .8rem; border: 1px solid var(--border); background: var(--surface); }
  .t-info .t-time { font-family: 'DM Mono', monospace; font-size: .62rem; color: var(--muted); }
  .t-info .t-label { font-size: .78rem; font-weight: 600; margin: .1rem 0 .15rem; }
  .t-active .t-dot { border-color: var(--accent) !important; background: rgba(200,241,53,.12); }
  .t-active .t-label { color: var(--accent); }

  .legend-card { background: var(--card); border-radius: var(--r); border: 1px solid var(--border); padding: .9rem 1.1rem; }
  .legend-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .45rem; }
  .legend-item { display: flex; align-items: center; gap: .45rem; font-size: .72rem; }
  .legend-dot { width: 9px; height: 9px; border-radius: 3px; flex-shrink: 0; }

  #toast {
    position: fixed; bottom: 1.5rem; right: 1.5rem;
    background: var(--card); border: 1px solid var(--accent);
    border-radius: var(--r); padding: .9rem 1.1rem; min-width: 250px;
    z-index: 9999; transform: translateY(130%); opacity: 0;
    transition: all .3s cubic-bezier(.34,1.56,.64,1);
    box-shadow: 0 8px 32px rgba(0,0,0,.6);
  }
  #toast.show { transform: translateY(0); opacity: 1; }
  .toast-head { display: flex; align-items: center; gap: .45rem; margin-bottom: .25rem; }
  .toast-title { font-size: .78rem; font-weight: 700; }
  .toast-body { font-size: .7rem; color: var(--muted); }

  @media(max-width:900px) { main { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">💪</div>
    <div>
      <div class="logo-text">Haris Ahmad</div>
      <div class="logo-sub">GYM ROUTINE TRACKER</div>
    </div>
  </div>
  <nav>
    <span id="clock"></span>
    <span id="notifStatus">🔕 Alerts off</span>
    <button id="notifBtn" onclick="enableNotifs()">Enable Alerts</button>
  </nav>
</header>

<main>
  <div>
    <div class="cal-header">
      <div>
        <div class="sec-title">Monthly View</div>
        <div class="cal-month" id="calTitle"></div>
      </div>
      <div class="cal-nav">
        <button onclick="changeMonth(-1)">‹</button>
        <button onclick="changeMonth(1)">›</button>
      </div>
    </div>
    <div class="day-labels">
      <div class="day-label">Sun</div><div class="day-label">Mon</div>
      <div class="day-label">Tue</div><div class="day-label">Wed</div>
      <div class="day-label">Thu</div>
      <div class="day-label" style="color:var(--red)">Fri</div>
      <div class="day-label">Sat</div>
    </div>
    <div class="cal-grid" id="calGrid"></div>
  </div>

  <div class="sidebar">
    <div class="today-card" id="todayCard">
      <div class="sec-title">Selected Day</div>
      <div id="selectedTitle" style="font-size:1rem;font-weight:700;margin-bottom:.5rem"></div>
      <div id="splitBadge"></div>
      <div class="workout-list" id="workoutList"></div>
    </div>

    <div class="meal-card">
      <div class="sec-title">Daily Meals</div>
      <div id="mealList"></div>
    </div>

    <div class="timeline-card">
      <div class="sec-title">Gym & Sleep Schedule</div>
      <div id="timeline"></div>
    </div>

    <div class="legend-card">
      <div class="sec-title">Split Legend</div>
      <div class="legend-grid">
        <div class="legend-item"><div class="legend-dot" style="background:var(--chest)"></div>Chest / Tricep</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--back)"></div>Back / Bicep</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--bicep)"></div>Bicep / Tricep</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--shoulder)"></div>Shoulder / Leg</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--off)"></div>Friday — Off</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--accent);border-radius:50%"></div>Today</div>
      </div>
    </div>
  </div>
</main>

<div id="toast">
  <div class="toast-head"><span id="toastEmoji"></span><span class="toast-title" id="toastTitle"></span></div>
  <div class="toast-body" id="toastBody"></div>
</div>

<script>
const SPLITS = [
  { id:'shoulder', label:'Shoulder / Leg', cls:'s-shoulder', color:'#c8f135', emoji:'🦵',
    exercises:[
      {name:'Overhead Press',    sets:'4×8'},
      {name:'Lateral Raises',    sets:'4×15'},
      {name:'Front Raises',      sets:'3×12'},
      {name:'Rear Delt Flyes',   sets:'3×12'},
      {name:'Squats',            sets:'4×8'},
      {name:'Leg Press',         sets:'3×10'},
      {name:'Calf Raises',       sets:'3×15'},
    ]},
  { id:'chest', label:'Chest / Tricep', cls:'s-chest', color:'#f97316', emoji:'🏋️',
    exercises:[
      {name:'Flat Bench Press',       sets:'4×8–10'},
      {name:'Incline Dumbbell Press', sets:'3×10'},
      {name:'Cable Flyes',            sets:'3×12'},
      {name:'Tricep Pushdown',        sets:'3×12'},
      {name:'Overhead Tricep Ext.',   sets:'3×10'},
      {name:'Dips',                   sets:'3×failure'},
    ]},
  { id:'back', label:'Back / Bicep', cls:'s-back', color:'#7c3aed', emoji:'🦾',
    exercises:[
      {name:'Deadlift',             sets:'4×6–8'},
      {name:'Lat Pulldown',         sets:'4×8'},
      {name:'Seated Cable Row',     sets:'3×10'},
      {name:'Face Pulls',           sets:'3×15'},
      {name:'Barbell Curl',         sets:'3×10'},
      {name:'Hammer Curl',          sets:'3×12'},
    ]},
  { id:'bicep', label:'Bicep / Tricep', cls:'s-bicep', color:'#22d3ee', emoji:'💪',
    exercises:[
      {name:'EZ Bar Curl',           sets:'4×10'},
      {name:'Concentration Curl',    sets:'3×12'},
      {name:'Incline Dumbbell Curl', sets:'3×10'},
      {name:'Close-Grip Bench',      sets:'4×8'},
      {name:'Skull Crushers',        sets:'3×10'},
      {name:'Cable Tricep Kickback', sets:'3×12'},
    ]},
];

const OFF = { id:'off', label:'Rest Day', cls:'s-off', color:'#3b3b4f', emoji:'😴', exercises:[] };

// Wednesday June 25 2026 = Shoulder/Leg = index 0
const ANCHOR = new Date(2026, 5, 25);

function getSplit(date) {
  if (date.getDay() === 5) return OFF;
  const d = new Date(date); d.setHours(0,0,0,0);
  const a = new Date(ANCHOR); a.setHours(0,0,0,0);
  let idx = 0;
  if (d >= a) {
    let cur = new Date(a);
    while (cur < d) {
      cur.setDate(cur.getDate() + 1);
      if (cur.getDay() !== 5) idx++;
    }
  } else {
    let cur = new Date(a);
    while (cur > d) {
      if (cur.getDay() !== 5) idx--;
      cur.setDate(cur.getDate() - 1);
    }
  }
  return SPLITS[((idx % 4) + 4) % 4];
}

const MEALS = [
  { time:'07:30', label:'🌅 Morning Meal', icon:'🥣', color:'#f97316', notifLabel:'Morning Meal Time!',
    items:['Oats with Milk & Banana','2 Boiled Eggs','Protein Shake + Creatine Monohydrate','Weider Mega Mass 4000 Shake'] },
  { time:'13:00', label:'☀️ Lunch', icon:'🍽️', color:'#7c3aed', notifLabel:'Lunch Time!',
    items:['Chicken Breast or Beef','Daal / Lentils','Roti or Rice','Salad'] },
  { time:'16:30', label:'🍎 Pre-Gym Fruit Chart', icon:'🍉', color:'#22d3ee', notifLabel:'Pre-Gym Fruit Chart!',
    items:['Banana × 2','Apple or Mango','Watermelon slice','Vitamin C Capsule','Spirulina Capsule'] },
  { time:'20:00', label:'🌙 Night / Post-Gym Meal', icon:'🍛', color:'#c8f135', notifLabel:'Post-Gym Night Meal!',
    items:['Rice + Chicken or Daal','Mixed Vegetables','Gluta Fair capsule','Spirulina Capsule','Vitamin C Capsule'] },
];

const GYM_SLEEP = [
  { time:'06:30', label:'Wake Up',     emoji:'⏰', color:'#6b6b80' },
  { time:'17:30', label:'Gym Session', emoji:'🏋️', color:'#c8f135', detail:'60–90 min · Evening session' },
  { time:'22:30', label:'Wind Down',   emoji:'📵', color:'#6b6b80', detail:'Avoid screens, relax' },
  { time:'23:00', label:'Bedtime 🌙',  emoji:'😴', color:'#3b3b4f', detail:'Target 7–8 hours sleep' },
];

function renderMeals() {
  const nowMin = new Date().getHours()*60 + new Date().getMinutes();
  document.getElementById('mealList').innerHTML = MEALS.map(m => {
    const [hh,mm] = m.time.split(':').map(Number);
    const active = Math.abs(hh*60+mm - nowMin) < 90;
    return `<div class="meal-item">
      <div class="meal-icon">${m.icon}</div>
      <div>
        <div class="meal-time">${m.time}</div>
        <div class="meal-name" style="${active?'color:'+m.color:''}">${m.label}</div>
        <div class="meal-detail">${m.items.join(' · ')}</div>
      </div>
    </div>`;
  }).join('');
}

function renderTimeline() {
  const nowMin = new Date().getHours()*60 + new Date().getMinutes();
  document.getElementById('timeline').innerHTML = GYM_SLEEP.map(item => {
    const [hh,mm] = item.time.split(':').map(Number);
    const active = Math.abs(hh*60+mm - nowMin) < 60;
    return `<div class="t-item${active?' t-active':''}">
      <div class="t-dot" style="${active?'border-color:'+item.color+';background:'+item.color+'22':''}">${item.emoji}</div>
      <div class="t-info">
        <div class="t-time">${item.time}</div>
        <div class="t-label">${item.label}</div>
        ${item.detail?`<div style="font-size:.68rem;color:var(--muted)">${item.detail}</div>`:''}
      </div>
    </div>`;
  }).join('');
}

let viewYear = new Date().getFullYear();
let viewMonth = new Date().getMonth();
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

function renderCalendar() {
  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';
  document.getElementById('calTitle').textContent = `${MONTHS[viewMonth]} ${viewYear}`;
  const first = new Date(viewYear, viewMonth, 1).getDay();
  const days  = new Date(viewYear, viewMonth+1, 0).getDate();
  const today = new Date(); today.setHours(0,0,0,0);

  for (let i=0; i<first; i++) {
    const e = document.createElement('div'); e.className='cal-day empty'; grid.appendChild(e);
  }
  for (let d=1; d<=days; d++) {
    const date = new Date(viewYear, viewMonth, d);
    const split = getSplit(date);
    const isToday = date.getTime()===today.getTime();
    const cell = document.createElement('div');
    cell.className = `cal-day ${split.cls}${isToday?' today':''}`;
    cell.onclick = () => selectDay(date, split);
    const mealDots = MEALS.map(m=>`<div class="mdot" style="background:${m.color}88"></div>`).join('');
    const restHtml = split.id==='off' ? '<div style="font-size:.6rem;color:var(--muted);margin-top:4px">Rest · Recover 💤</div>' : '';
    cell.innerHTML = `
      <div style="display:flex;align-items:center;justify-content:space-between">
        <div class="dn">${d}</div>
        ${isToday?'<div style="font-size:.55rem;font-family:DM Mono,monospace;color:var(--accent)">TODAY</div>':''}
      </div>
      <div class="split-badge-sm">${split.id==='off'?'OFF':split.label}</div>
      ${restHtml}
      <div class="meal-dots">${mealDots}</div>
    `;
    grid.appendChild(cell);
  }
}

function changeMonth(dir) {
  viewMonth += dir;
  if (viewMonth>11){viewMonth=0;viewYear++;}
  if (viewMonth<0){viewMonth=11;viewYear--;}
  renderCalendar();
}

function selectDay(date, split) {
  document.getElementById('selectedTitle').textContent =
    date.toLocaleDateString('en-PK',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  document.getElementById('splitBadge').innerHTML =
    `<div class="split-pill" style="background:${split.color}1a;color:${split.color};border:1px solid ${split.color}44">
      ${split.emoji} ${split.label}
    </div>`;
  document.getElementById('workoutList').innerHTML = split.exercises.length === 0
    ? `<div style="color:var(--muted);font-size:.78rem;padding:.4rem 0">Rest day — recover & sleep well 💤</div>`
    : split.exercises.map(ex=>`
        <div class="workout-ex">
          <span>${ex.name}</span><span class="sets">${ex.sets}</span>
        </div>`).join('');
}

let notifEnabled = false, lastNotif = {};
function enableNotifs() {
  if (!('Notification' in window)) { showToast('⚠️','Not supported','Try Chrome or Edge.'); return; }
  Notification.requestPermission().then(p => {
    if (p==='granted') {
      notifEnabled = true;
      document.getElementById('notifStatus').textContent = '🔔 Alerts on';
      document.getElementById('notifStatus').style.color = 'var(--accent)';
      showToast('🔔','Alerts Enabled','Meal, gym & sleep reminders are active!');
    } else {
      showToast('⚠️','Denied','Allow notifications in browser settings.');
    }
  });
}

function checkNotifications() {
  if (!notifEnabled) return;
  const nowMin = new Date().getHours()*60+new Date().getMinutes();
  [...MEALS, ...GYM_SLEEP].forEach(item => {
    const [hh,mm] = item.time.split(':').map(Number);
    if (nowMin === hh*60+mm && !lastNotif[item.time]) {
      lastNotif[item.time] = true;
      const title = item.notifLabel || item.label;
      new Notification(title, { body: item.items ? item.items.join(', ') : (item.detail||'') });
      showToast(item.icon||item.emoji, title, item.items ? item.items[0] : (item.detail||''));
      setTimeout(()=>{ delete lastNotif[item.time]; }, 70000);
    }
  });
}
let toastTimer;
function showToast(emoji, title, body) {
  document.getElementById('toastEmoji').textContent = emoji+' ';
  document.getElementById('toastTitle').textContent = title;
  document.getElementById('toastBody').textContent = body;
  const t = document.getElementById('toast');
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('show'), 5000);
}

function updateClock() {
  document.getElementById('clock').textContent =
    new Date().toLocaleTimeString('en-PK',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}

renderCalendar();
renderMeals();
renderTimeline();
const today = new Date(); today.setHours(0,0,0,0);
selectDay(today, getSplit(today));
updateClock();
setInterval(updateClock, 1000);
setInterval(checkNotifications, 30000);
setInterval(()=>{ renderMeals(); renderTimeline(); }, 60000);
</script>
</body>
</html>
